{% extends "base.html" %}
{% block title %}Edit Analyst{% endblock %}
{% block extra_css %}
<style>
.wrap{max-width:760px;margin:1.25rem 0}.panel{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:.9rem;padding:1rem}
.row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}.form-group{margin-bottom:.9rem}
@media (max-width:700px){.row{grid-template-columns:1fr}}
</style>
{% endblock %}
{% block content %}
<div class="wrap">
  <a href="{% url 'core:sub_admin_analyst_detail' analyst.id %}" class="btn btn-secondary">Back</a>
  <h1 style="margin:.8rem 0 .2rem">Edit {{ analyst.alias }}</h1>
  <p style="color:var(--text-secondary);margin:0 0 1rem">Update profile and account state.</p>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <div class="panel">
    <form method="post">{% csrf_token %}
      <div class="row">
        <div class="form-group"><label for="alias">Alias</label><input id="alias" type="text" name="alias" value="{{ analyst.alias }}" required></div>
        <div class="form-group"><label for="new_password">New Password (Optional)</label><input id="new_password" type="password" name="new_password"></div>
      </div>
      <div class="form-group"><label><input type="checkbox" name="is_active" {% if analyst.is_active %}checked{% endif %}> Active Account</label></div>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap"><button class="btn btn-primary" type="submit">Save Changes</button><a href="{% url 'core:sub_admin_analyst_detail' analyst.id %}" class="btn btn-secondary">Cancel</a></div>
    </form>
  </div>
</div>
{% endblock %}
