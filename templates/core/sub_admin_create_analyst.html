{% extends "base.html" %}
{% block title %}Create Analyst{% endblock %}
{% block extra_css %}
<style>
.wrap{max-width:760px;margin:1.25rem 0}.panel{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:.9rem;padding:1rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.form-group{margin-bottom:.9rem}small{color:var(--text-secondary)}
@media (max-width:700px){.grid{grid-template-columns:1fr}}
</style>
{% endblock %}
{% block content %}
<div class="wrap">
  <a href="{% url 'core:sub_admin_analyst_list' %}" class="btn btn-secondary">Back</a>
  <h1 style="margin:.8rem 0 .2rem">Create Analyst</h1>
  <p style="color:var(--text-secondary);margin:0 0 1rem">Add a new analyst to your workspace.</p>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <div class="panel">
    <form method="post">{% csrf_token %}
      <div class="grid">
        <div class="form-group"><label for="alias">Alias</label><input id="alias" type="text" name="alias" value="{{ alias|default:'' }}" required></div>
        <div class="form-group"><label for="email">Email</label><input id="email" type="email" name="email" value="{{ email|default:'' }}" required></div>
      </div>
      <div class="grid">
        <div class="form-group"><label for="password">Password</label><input id="password" type="password" name="password" required><small>Use a strong password.</small></div>
        <div class="form-group"><label for="confirm_password">Confirm Password</label><input id="confirm_password" type="password" name="confirm_password" required></div>
      </div>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap"><button class="btn btn-primary" type="submit">Create Analyst</button><a href="{% url 'core:sub_admin_analyst_list' %}" class="btn btn-secondary">Cancel</a></div>
    </form>
  </div>
</div>
{% endblock %}
