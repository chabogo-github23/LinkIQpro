{# Page navigation buttons component #}
{% load static %}

<div class="page-nav-controls">
    <div class="nav-buttons">
        <!-- Back button -->
        {% if back_url %}
            <a href="{{ back_url }}" class="nav-btn nav-btn-back" title="Go back">
                <i class="fas fa-arrow-left"></i>
                <span>{{ back_label|default:"Back" }}</span>
            </a>
        {% else %}
            <button onclick="window.history.back()" class="nav-btn nav-btn-back" title="Go back">
                <i class="fas fa-arrow-left"></i>
                <span>{{ back_label|default:"Back" }}</span>
            </button>
        {% endif %}
        
        <!-- Forward button -->
        {% if forward_url %}
            <a href="{{ forward_url }}" class="nav-btn nav-btn-forward" title="Go forward">
                <i class="fas fa-arrow-right"></i>
                <span>{{ forward_label|default:"Next" }}</span>
            </a>
        {% endif %}
        
        <!-- Refresh button -->
{% comment %}
            <button onclick="location.reload()" class="nav-btn nav-btn-refresh" title="Refresh">
                <i class="fas fa-sync-alt"></i>
                <span>Refresh</span>
            </button>
{% endcomment %}
    </div>
</div>
